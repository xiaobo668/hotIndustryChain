<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>K线教学 · 章节分享</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
  <style>
    :root {
      --bg: #0f0f1a;
      --surface: #1a1a2e;
      --border: rgba(255,255,255,0.08);
      --text: #e8e8f0;
      --muted: #8888aa;
      --accent: #f59e0b;
      --green: #10b981;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "PingFang SC", -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px 48px;
    }
    .wrap { max-width: 720px; margin: 0 auto; }
    .badge {
      display: inline-block;
      background: rgba(245,158,11,0.15);
      color: var(--accent);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    h1 { font-size: 28px; margin-bottom: 8px; }
    .sub { color: var(--muted); font-size: 16px; margin-bottom: 28px; line-height: 1.6; }
    .points {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px 24px;
      margin-bottom: 24px;
    }
    .points h2 { font-size: 16px; color: var(--green); margin-bottom: 12px; }
    .points li { margin: 8px 0 8px 20px; line-height: 1.6; }
    .section {
      margin-bottom: 20px;
      padding: 16px 20px;
      background: rgba(255,255,255,0.03);
      border-radius: 12px;
      border: 1px solid var(--border);
    }
    .section h3 { font-size: 17px; margin-bottom: 8px; color: var(--accent); }
    .section p { color: var(--muted); line-height: 1.7; font-size: 15px; }
    .kline-chart-wrap {
      margin: 14px 0;
      padding: 10px;
      background: rgba(0,0,0,0.2);
      border: 1px solid var(--border);
      border-radius: 10px;
    }
    .kline-chart-slot { width: 100%; height: 320px; }
    .kline-chart-caption { font-size: 12px; color: var(--muted); text-align: center; margin-top: 8px; }
    .actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 28px; }
    .btn {
      padding: 10px 18px;
      border-radius: 10px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }
    .btn-primary {
      background: linear-gradient(135deg, #f59e0b, #d97706);
      color: #fff;
    }
    .btn-secondary {
      background: rgba(255,255,255,0.08);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .footer { margin-top: 40px; font-size: 13px; color: var(--muted); text-align: center; }
    .err { text-align: center; padding: 60px 20px; }
  </style>
</head>
<body>
  <div class="wrap" id="app">
    <p>加载中…</p>
  </div>
  <script src="../js/kline/outline.js"></script>
  <script src="../js/kline/content/part-1-ch-1.js"></script>
  <script src="../js/kline/charts.js"></script>
  <script src="../js/kline/share.js"></script>
  <script>
    (function () {
      if (typeof mergeKlinePartContent === 'function') mergeKlinePartContent();

      function resolveShareTarget(id) {
        var parts = typeof getKlineParts === 'function' ? getKlineParts() : [];
        for (var i = 0; i < parts.length; i++) {
          var p = parts[i];
          if (p.chapters) {
            for (var j = 0; j < p.chapters.length; j++) {
              if (p.chapters[j].id === id) {
                return { part: p, chapter: p.chapters[j] };
              }
            }
          }
          if (p.id === id) return { part: p, chapter: null };
        }
        return null;
      }

      function esc(s) {
        return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      }

      function bodyHtml(body) {
        return esc(body).replace(/\n/g, '<br/>');
      }

      var params = new URLSearchParams(window.location.search);
      var paramId = params.get('chapter') || 'part-1-ch-1';
      var target = resolveShareTarget(paramId);
      var app = document.getElementById('app');

      if (!target) {
        app.innerHTML = '<div class="err"><h1>章节不存在</h1><p style="margin-top:12px;color:#888">请检查链接中的 chapter 参数</p></div>';
        document.title = 'K线教学 · 章节未找到';
        return;
      }

      var part = target.part;
      var chapter = target.chapter;
      var content = chapter || part;

      document.title = (chapter
        ? part.partLabel + ' ' + chapter.chapterLabel + ' · ' + chapter.title
        : part.partLabel + ' · ' + part.title) + ' | K线教学';

      var sectionsHtml = (content.sections || []).map(function (s, idx) {
        var charts = '';
        if (s.chart) {
          charts += '<div class="kline-chart-wrap"><div class="kline-chart-slot" data-chart="' + s.chart + '" id="share-chart-' + idx + '"></div><p class="kline-chart-caption"></p></div>';
        }
        if (s.chart2) {
          charts += '<div class="kline-chart-wrap"><div class="kline-chart-slot" data-chart="' + s.chart2 + '" id="share-chart-' + idx + '-b"></div><p class="kline-chart-caption"></p></div>';
        }
        return '<div class="section"><h3>' + esc(s.heading) + '</h3>' + charts + '<p>' + bodyHtml(s.body) + '</p></div>';
      }).join('');

      var points = content.sharePoints || part.sharePoints || [];
      var pointsHtml = points.map(function (p) {
        return '<li>' + esc(p) + '</li>';
      }).join('');

      var homeHash = chapter
        ? '#kline/' + part.id + '/' + chapter.id
        : '#kline/' + part.id;
      var homeUrl = window.location.origin + window.location.pathname.replace(/share\/kline\.html.*$/, 'index.html') + homeHash;

      app.innerHTML =
        '<span class="badge">' + esc(chapter ? part.partLabel + ' · ' + chapter.chapterLabel : part.partLabel) + '</span>' +
        '<h1>' + esc((chapter && chapter.icon) || part.icon || '📊') + ' ' + esc(chapter ? chapter.title : part.title) + '</h1>' +
        '<p class="sub">' + esc(content.subtitle) + '</p>' +
        '<div class="points"><h2>本章要点</h2><ul>' + pointsHtml + '</ul></div>' +
        sectionsHtml +
        '<div class="actions">' +
        '<a class="btn btn-primary" href="' + homeUrl + '">在应用中打开完整章节</a>' +
        '<button class="btn btn-secondary" type="button" id="btn-copy">复制分享文案</button>' +
        '</div>' +
        '<p class="footer">K线教学 · 可分享章节页</p>';

      document.getElementById('btn-copy').addEventListener('click', function () {
        copyKlineShareText(part.id, chapter ? chapter.id : null);
      });

      if (typeof initKlineCharts === 'function') {
        setTimeout(initKlineCharts, 80);
      }
    })();
  </script>
</body>
</html>
