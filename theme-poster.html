<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>涨幅榜 · YTD & 主题 · 2026</title>
  <script>
    if (window.location.hash === '#order-ranks') {
      window.location.replace('order-tracks.html');
    }
  </script>
  <style>
    :root {
      --bg: #0f0f1a;
      --text: #e8e8f0;
      --text-muted: #8888aa;
      --accent: #6c63ff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "PingFang SC", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }
    .wrap { max-width: 520px; margin: 0 auto; }
    h1 { font-size: 20px; margin-bottom: 8px; }
    .sub { color: var(--text-muted); font-size: 13px; line-height: 1.6; margin-bottom: 20px; }
    .poster-wrap { display: flex; flex-direction: column; align-items: center; gap: 16px; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-top: 8px; }
    .btn {
      padding: 10px 18px; border-radius: 10px; border: none;
      font-size: 14px; font-weight: 600; cursor: pointer;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #00d4ff);
      color: #fff;
    }
    .btn-secondary {
      background: rgba(255,255,255,0.08);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.12);
    }
    a.back { color: var(--accent); font-size: 13px; display: inline-block; margin-bottom: 16px; }
    .nav-card {
      display: block;
      margin-bottom: 24px;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid rgba(0, 212, 255, 0.35);
      background: rgba(0, 212, 255, 0.06);
      color: #67e8f9;
      text-decoration: none;
      font-size: 14px;
    }
    .nav-card:hover { background: rgba(0, 212, 255, 0.12); }
    .ytd-gainers-table-wrap { max-width: 560px; width: 100%; margin: 16px auto 0; overflow-x: auto; }
    .ytd-gainers-table { width: 100%; border-collapse: collapse; font-size: 11px; }
    .ytd-gainers-table th, .ytd-gainers-table td {
      border: 1px solid rgba(255,255,255,0.08); padding: 6px 8px; text-align: left; vertical-align: top;
    }
    .ytd-gainers-table th { background: rgba(220,38,38,0.15); color: #fca5a5; }
    .ytd-gainers-table .pct { color: #f87171; font-weight: 700; }
    .ytd-gainers-table .code { font-size: 10px; color: var(--text-muted); }
    .rise-tag { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 600; }
    .rise-tag.type-official { background: rgba(52,211,153,0.15); color: #34d399; }
    .rise-tag.type-media { background: rgba(96,165,250,0.15); color: #60a5fa; }
    .rise-tag.type-hype { background: rgba(251,146,60,0.15); color: #fb923c; }
    .ytd-gainers-note { font-size: 11px; color: var(--text-muted); margin-top: 10px; line-height: 1.5; }
    .ytd-gainers-sub { font-size: 12px; color: var(--text-muted); margin-top: 12px; line-height: 1.65; }
    .ytd-gainers-footer {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 10px;
      line-height: 1.55;
      padding: 10px 12px;
      background: rgba(220, 38, 38, 0.06);
      border: 1px solid rgba(220, 38, 38, 0.18);
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="index.html">← 返回产业链分析</a>
    <a class="nav-card" href="order-poster.html">🏆 2026 产业链订单排行榜 → 已迁至独立页面</a>
    <h1 id="ytd-gainers">2026年初至今涨幅 Top15</h1>
    <p class="sub">统计区间：2026年首个交易日至最近收盘（东方财富 f25 年初至今涨跌幅，前复权）；口径：沪深主板+创业板，剔除科创板/北交所/ST/*ST/-UW。每家公司标注涨幅、涨跌归因（业绩/情绪/炒作）及上涨原因说明。</p>
    <div class="poster-wrap" id="ytd-gainers-wrap">
      <div id="ytd-gainers-pages"></div>
      <div class="actions">
        <button class="btn btn-primary" type="button" onclick="downloadYtdGainersPoster('ytd-gainers-canvas','2026年初涨幅Top15.png')">⬇️ 下载涨幅榜</button>
        <button class="btn btn-secondary" type="button" onclick="copyYtdGainersPoster('ytd-gainers-canvas')">📋 复制</button>
      </div>
      <div class="ytd-gainers-table-wrap" id="ytd-gainers-table"></div>
    </div>
    <h1 style="margin-top:36px;font-size:20px">六大主题 · 核心技术龙头涨幅榜</h1>
    <p class="sub">统计区间：2026-05-06（五一后首个交易日）至 2026-05-28 收盘。按区间内前复权涨幅排序取前五；行情来源腾讯财经。</p>
    <div class="poster-wrap" id="theme-poster-wrap">
      <div id="theme-poster-pages"></div>
      <div class="actions">
        <button class="btn btn-primary" type="button" onclick="downloadThemePoster()">⬇️ 下载涨幅榜</button>
        <button class="btn btn-secondary" type="button" onclick="copyThemePoster()">📋 复制涨幅榜</button>
        <button class="btn btn-secondary" type="button" onclick="initThemePosterPage()">🔄 刷新</button>
      </div>
    </div>
  </div>
  <script src="js/utils/canvas.js"></script>
  <script src="data/theme-poster-may2026.js"></script>
  <script src="data/ytd-gainers2026.js"></script>
  <script src="js/industry/theme-poster.js"></script>
  <script src="js/industry/ytd-gainers-poster.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (typeof YTD_GAINERS2026 !== 'undefined') {
        initYtdGainersPosterPage(YTD_GAINERS2026, 'ytd-gainers-pages', 'ytd-gainers-canvas');
        renderYtdGainersTable(YTD_GAINERS2026, 'ytd-gainers-table');
      }
      initThemePosterPage();
    });
  </script>
</body>
</html>
