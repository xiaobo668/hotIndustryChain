<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>主题涨幅榜海报 · 2026.5.6–5.28</title>
  <style>
    :root {
      --bg: #0f0f1a;
      --text: #e8e8f0;
      --text-muted: #8888aa;
      --accent: #6c63ff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "PingFang SC", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }
    .wrap { max-width: 520px; margin: 0 auto; }
    h1 { font-size: 20px; margin-bottom: 8px; }
    .sub { color: var(--text-muted); font-size: 13px; line-height: 1.6; margin-bottom: 20px; }
    .poster-wrap { display: flex; flex-direction: column; align-items: center; gap: 16px; }
    .poster-page-label {
      font-size: 13px; color: var(--text-muted); text-align: center;
    }
    .poster-canvas-item {
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-top: 8px; }
    .btn {
      padding: 10px 18px; border-radius: 10px; border: none;
      font-size: 14px; font-weight: 600; cursor: pointer;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #00d4ff);
      color: #fff;
    }
    .btn-secondary {
      background: rgba(255,255,255,0.08);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.12);
    }
    a.back { color: var(--accent); font-size: 13px; display: inline-block; margin-bottom: 16px; }
  </style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="index.html">← 返回产业链分析</a>
    <h1>六大主题 · 核心技术龙头涨幅榜</h1>
    <p class="sub">统计区间：2026-05-06（五一后首个交易日）至 2026-05-28 收盘。按区间内前复权涨幅排序取前五；行情来源腾讯财经。</p>
    <div class="poster-wrap" id="theme-poster-wrap">
      <div id="theme-poster-pages"></div>
      <div class="actions">
        <button class="btn btn-primary" type="button" onclick="downloadThemePoster()">⬇️ 下载海报</button>
        <button class="btn btn-secondary" type="button" onclick="copyThemePoster()">📋 复制海报</button>
        <button class="btn btn-secondary" type="button" onclick="initThemePosterPage()">🔄 刷新</button>
      </div>
    </div>
  </div>
  <script src="js/utils/canvas.js"></script>
  <script src="data/theme-poster-may2026.js"></script>
  <script src="js/industry/theme-poster.js"></script>
  <script>document.addEventListener('DOMContentLoaded', initThemePosterPage);</script>
</body>
</html>
