# 腾讯云 SCF 部署配置
# 使用方式:
#   1. 安装: npm install -g @serverless/cli
#   2. 登录: serverless login（或设置环境变量 TENCENT_SECRET_ID / TENCENT_SECRET_KEY）
#   3. 部署: cd server && serverless deploy

component: scf # 腾讯云云函数组件
name: industry-chain-ai

inputs:
  region: ap-guangzhou        # 地域：ap-guangzhou(广州) ap-shanghai(北京) ap-beijing(北京)
  functionName: industry-chain-ai
  runtime: Nodejs18.15         # 运行时
  handler: index.main_handler   # 执行方法入口
  description: "产业链 AI 生成 API - DeepSeek 大模型驱动"
  memorySize: 256              # 内存 MB
  timeout: 30                  # 超时秒数
  codeUri: ./scf                # 函数代码目录

  # 环境变量
  environment:
    variables:
      DEEPSEEK_API_KEY: ${env:DEEPSEEK_API_KEY}
      DEEPSEEK_MODEL: deepseek-chat
      CACHE_TTL: "86400"

  # API 网关触发器
  events:
    - apigw:
        parameters:
          serviceName: industry-ai-api
          serviceDesc: "产业链 AI 生成服务"
          environment: release
          endpoints:
            - path: /api/industry
              method: POST
              description: "AI 生成产业链数据"
              function:
                isIntegratedResponse: true  # 启用集成响应，返回标准 JSON
              enableCORS: true             # 开启跨域
