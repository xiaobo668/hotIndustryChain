<!DOCTYPE html>

<head>

    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {

      background: var(--bg);
      color: var(--text);
      min-height: 100vh;

    .wrap { max-width: 520px; margin: 0 auto; }
    h1 { font-size: 20px; margin-bottom: 8px; color: #fbbf24; }

    .poster-wrap { display: flex; flex-direction: column; align-items: center; gap: 16px; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
    .btn {
      padding: 10px 18px; border-radius: 10px; border: none;

      color: var(--text);

    a.back { color: #fbbf24; font-size: 13px; display: inline-block; margin-bottom: 16px; text-decoration: none; }
    .nav-card {
      display: block;
      margin-bottom: 12px;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid rgba(217, 119, 6, 0.4);
      background: rgba(217, 119, 6, 0.08);
      color: #fbbf24;
      text-decoration: none;
      font-size: 14px;
    }
    .nav-card:hover { background: rgba(217, 119, 6, 0.14); }
    .note {
      margin-top: 20px;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid rgba(217, 119, 6, 0.25);
      background: rgba(217, 119, 6, 0.07);
      font-size: 12px;
      line-height: 1.65;
      color: var(--text-muted);

    .note strong { color: #fbbf24; }

</head>
