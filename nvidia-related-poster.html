<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />

  <style>
    :root {
      --bg: #0f0f1a;
      --text: #e8e8f0;
      --text-muted: #8888aa;
      --accent: #76b900;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "PingFang SC", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }
    .wrap { max-width: 520px; margin: 0 auto; }
    h1 { font-size: 20px; margin-bottom: 8px; color: #86efac; }
    .sub { color: var(--text-muted); font-size: 13px; line-height: 1.65; margin-bottom: 20px; }
    .poster-wrap { display: flex; flex-direction: column; align-items: center; gap: 16px; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
    .btn {
      padding: 10px 18px; border-radius: 10px; border: none;
      font-size: 14px; font-weight: 600; cursor: pointer;
    }
    .btn-primary {
      background: linear-gradient(135deg, #76b900, #16a34a);
      color: #fff;
    }
    .btn-secondary {
      background: rgba(255,255,255,0.08);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.12);
    }
    a.back { color: #86efac; font-size: 13px; display: inline-block; margin-bottom: 16px; text-decoration: none; }
    .nav-card {
      display: block;
      margin-bottom: 12px;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid rgba(118, 185, 0, 0.35);
      background: rgba(118, 185, 0, 0.08);
      color: #86efac;
      text-decoration: none;
      font-size: 14px;
    }
    .nav-card:hover { background: rgba(118, 185, 0, 0.14); }
    .note {
      margin-top: 20px;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid rgba(118, 185, 0, 0.2);
      background: rgba(118, 185, 0, 0.06);
      font-size: 12px;
      line-height: 1.65;
      color: var(--text-muted);
    }
    .note strong { color: #86efac; }
  </style>
</head>
<body>
  <div class="wrap">

    </div>

      与<a href="order-tracks.html" style="color:#67e8f9">各赛道订单榜</a>互为补充，不构成投资建议。
    </div>
  </div>
  <script src="js/utils/canvas.js"></script>
  <script src="data/nvidia-related-top102026.js"></script>
  <script src="js/industry/order-rank-poster.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {

    });

</body>
</html>
