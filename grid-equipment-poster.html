<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>电网设备产业链 · 核心龙头 Top10 海报</title>
  <style>
    :root {
      --bg: #071522;
      --text: #e8f5ff;
      --text-muted: #94a3b8;
      --accent: #38bdf8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "PingFang SC", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }
    .wrap { max-width: 520px; margin: 0 auto; }
    h1 { font-size: 20px; margin-bottom: 8px; color: #7dd3fc; }
    .sub { color: var(--text-muted); font-size: 13px; line-height: 1.65; margin-bottom: 20px; }
    .poster-wrap { display: flex; flex-direction: column; align-items: center; gap: 16px; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
    .btn {
      padding: 10px 18px; border-radius: 10px; border: none;
      font-size: 14px; font-weight: 600; cursor: pointer;
    }
    .btn-primary {
      background: linear-gradient(135deg, #0284c7, #075985);
      color: #fff;
    }
    .btn-secondary {
      background: rgba(255,255,255,0.08);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.12);
    }
    a.back { color: #7dd3fc; font-size: 13px; display: inline-block; margin-bottom: 16px; text-decoration: none; }
    .nav-card {
      display: block;
      margin-bottom: 12px;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid rgba(56, 189, 248, 0.4);
      background: rgba(56, 189, 248, 0.08);
      color: #7dd3fc;
      text-decoration: none;
      font-size: 14px;
    }
    .nav-card:hover { background: rgba(56, 189, 248, 0.14); }
    .note {
      margin-top: 20px;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid rgba(56, 189, 248, 0.25);
      background: rgba(56, 189, 248, 0.07);
      font-size: 12px;
      line-height: 1.65;
      color: var(--text-muted);
    }
    .note strong { color: #7dd3fc; }
  </style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="index.html">← 返回产业链首页</a>
    <a class="nav-card" href="order-tracks.html">⚡ 对比：电力等赛道订单榜合集 →</a>
    <h1>电网设备产业链核心龙头 Top10</h1>
    <p class="sub">覆盖输变电一次设备、二次设备、变压器、高压开关、配电设备与智能计量等关键环节；支持海报下载、复制与刷新。</p>
    <div class="poster-wrap" id="grid-equipment-wrap">
      <div id="grid-equipment-pages"></div>
      <div class="actions">
        <button class="btn btn-primary" type="button" onclick="downloadOrderRankPoster('grid-equipment-canvas','电网设备产业链核心龙头Top10-2026.png')">⬇️ 下载海报</button>
        <button class="btn btn-secondary" type="button" onclick="copyOrderRankPoster('grid-equipment-canvas')">📋 复制海报</button>
        <button class="btn btn-secondary" type="button" onclick="initOrderRankPosterPage(GRID_EQUIPMENT_TOP102026,'grid-equipment-pages','grid-equipment-canvas')">🔄 刷新</button>
      </div>
    </div>
    <div class="note">
      <strong>口径说明：</strong>按核心产品、产业链位置、项目参与度与行业代表性综合梳理，序号只用于海报展示，不代表证券价值或投资优先级；内容仅作产业学习，不构成投资建议。
    </div>
  </div>
  <script src="js/utils/canvas.js"></script>
  <script src="data/grid-equipment-top102026.js"></script>
  <script src="js/industry/order-rank-poster.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      initOrderRankPosterPage(GRID_EQUIPMENT_TOP102026, 'grid-equipment-pages', 'grid-equipment-canvas');
    });
  </script>
</body>
</html>
