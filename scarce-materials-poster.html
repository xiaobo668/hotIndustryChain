<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>半导体12大稀缺材料 · 上中下游海报</title>
  <style>
    :root {
      --bg: #0f0f1a;
      --text: #e8e8f0;
      --text-muted: #8888aa;
      --accent: #6366f1;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "PingFang SC", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }
    .wrap { max-width: 520px; margin: 0 auto; }
    h1 { font-size: 20px; margin-bottom: 8px; }
    .sub { color: var(--text-muted); font-size: 13px; line-height: 1.6; margin-bottom: 20px; }
    a.back { color: var(--accent); font-size: 13px; display: inline-block; margin-bottom: 16px; }
    .poster-wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .scarce-poster-block {
      display: flex; flex-direction: column; align-items: center; gap: 12px;
      width: 100%; margin-bottom: 28px; padding-bottom: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .scarce-poster-block:last-child { border-bottom: none; margin-bottom: 0; }
    .poster-page-label { font-size: 13px; color: var(--text-muted); text-align: center; }
    .poster-canvas-item {
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .actions, .scarce-poster-actions {
      display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-top: 4px;
    }
    .btn {
      padding: 10px 18px; border-radius: 10px; border: none;
      font-size: 14px; font-weight: 600; cursor: pointer;
    }
    .btn-primary {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
    }
    .btn-secondary {
      background: rgba(255,255,255,0.08);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.12);
    }
    .tag-list {
      display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px;
    }
    .tag {
      font-size: 11px; padding: 4px 10px; border-radius: 999px;
      background: rgba(99,102,241,0.15); color: #a5b4fc;
      border: 1px solid rgba(99,102,241,0.3);
    }
    .compliance-box {
      background: rgba(99, 102, 241, 0.12);
      border: 1px solid rgba(99, 102, 241, 0.35);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 20px;
      font-size: 12px;
      line-height: 1.7;
      color: #c7d2fe;
    }
    .compliance-box strong { color: #e0e7ff; }
    .page-toolbar {
      display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
      margin: 8px 0 20px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="index.html">← 返回产业链分析</a>
    <h1>半导体12大稀缺材料</h1>
    <div class="compliance-box" id="scarce-compliance-box"></div>
    <p class="sub">12 类半导体关键材料、共 60 家代表企业（每类 5 家），拆分为<strong>上游 / 中游 / 下游</strong> 3 张海报，可分别下载。数据口径来自企业年报与公开产业报道，属于产业链产业资料工具书，无证券投资分析、无个股价值研判，不构成任何买卖操作建议。</p>
    <div class="tag-list">
      <span class="tag">上游：磷化铟 · 光刻胶 · 碳化硅 · ABF</span>
      <span class="tag">中游：钽电容 · 高端PCB · 电子级硫酸 · MLCC</span>
      <span class="tag">下游：铜箔 · 电子布 · 钽靶材 · 高纯氦气</span>
    </div>
    <div class="page-toolbar">
      <button class="btn btn-secondary" type="button" onclick="initScarceMaterialsPosterPage()">🔄 刷新全部</button>
    </div>
    <div class="poster-wrap">
      <div id="scarce-materials-poster-pages"></div>
    </div>
  </div>
  <script src="js/utils/canvas.js"></script>
  <script src="data/scarce-materials-poster2026.js"></script>
  <script src="js/industry/scarce-materials-poster.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', initScarceMaterialsPosterPage);
  </script>
</body>
</html>
